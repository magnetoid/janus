name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Janus — traces conversations, LLM calls, and tool usage. Opt-in via `janus plugins enable observability/langfuse` or `janus tools → Langfuse Observability`."
author: ImbaLabs
requires_env:
  - JANUS_LANGFUSE_PUBLIC_KEY
  - JANUS_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
